name: Refresh daily home run board

on:
  push:
    branches: ["main"]
  schedule:
    # 16:15 UTC is 9:15 AM Pacific during daylight time.
    - cron: "15 16 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional date to rerun (YYYY-MM-DD)
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      TARGET_DATE: ${{ inputs.target_date }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/cache@v4
        with:
          path: cache_trained_model
          key: hr-model-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: hr-model-cache-${{ runner.os }}-
      - run: pip install -r requirements.txt
      - name: Set automatic dates
        shell: bash
        run: |
          if [ -z "$TARGET_DATE" ]; then TARGET_DATE=$(TZ=America/Los_Angeles date +%F); fi
          FULL_DATA_END_DATE=$(date -d "${TARGET_DATE} -1 day" +%F)
          echo "TARGET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
          echo "FULL_DATA_END_DATE=$FULL_DATA_END_DATE" >> "$GITHUB_ENV"
      - name: Run model
        run: python hr_model.py
      - name: Build website data
        run: python build_site.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4
